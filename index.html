// ── GOOGLE CALENDAR OAUTH ─────────────────────────────────────────────────────
const WORKER_URL = 'https://fam-cal.sarah-lamee.workers.dev';
const GCAL_SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';

function gcalIsConnected() {
  try {
    const token = localStorage.getItem('gcal_access_token');
    const expiry = parseInt(localStorage.getItem('gcal_token_expiry') || '0');
    return !!(token && expiry > Date.now());
  } catch(e) { return false; }
}

function gcalConnect() {
  const params = new URLSearchParams({
    redirect_uri: window.location.origin + window.location.pathname
  });
  window.location.href = WORKER_URL + '/auth?' + params.toString();
}

function gcalDisconnect() {
  try {
    localStorage.removeItem('gcal_access_token');
    localStorage.removeItem('gcal_token_expiry');
    localStorage.removeItem('gcal_refresh_token');
  } catch(e) {}
}

async function gcalRefreshIfNeeded() {
  try {
    const expiry = parseInt(localStorage.getItem('gcal_token_expiry') || '0');
    if (expiry > Date.now() + 60000) return true; // still valid
    const refresh = localStorage.getItem('gcal_refresh_token');
    if (!refresh) return false;
    const res = await fetch(WORKER_URL + '/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: refresh })
    });
    if (!res.ok) return false;
    const data = await res.json();
    localStorage.setItem('gcal_access_token', data.access_token);
    localStorage.setItem('gcal_token_expiry', String(data.expiry));
    return true;
  } catch(e) { return false; }
}

async function gcalFetchEvents(startDate, endDate) {
  try {
    const ok = await gcalRefreshIfNeeded();
    if (!ok) return [];
    const token = localStorage.getItem('gcal_access_token');

    // Find the FAM Trips calendar
    const calListRes = await fetch(
      'https://www.googleapis.com/calendar/v3/users/me/calendarList',
      { headers: { Authorization: 'Bearer ' + token } }
    );
    const calList = await calListRes.json();
    const famCal = calList.items?.find(c =>
      c.summary?.toLowerCase().includes('fam trip') ||
      c.summary?.toLowerCase().includes('fam trips')
    );
    // Fall back to primary if no FAM Trips calendar found
    const calId = famCal ? encodeURIComponent(famCal.id) : 'primary';

    // Fetch events in date range
    const timeMin = new Date(startDate + 'T00:00:00').toISOString();
    const timeMax = new Date(endDate + 'T23:59:59').toISOString();
    const eventsRes = await fetch(
      `https://www.googleapis.com/calendar/v3/calendars/${calId}/events?` +
      new URLSearchParams({
        timeMin, timeMax,
        singleEvents: 'true',
        orderBy: 'startTime',
        maxResults: '50'
      }),
      { headers: { Authorization: 'Bearer ' + token } }
    );
    const eventsData = await eventsRes.json();
    const items = eventsData.items || [];

    // Map to our event format
    return items.map(e => {
      const start = e.start?.dateTime || e.start?.date || startDate;
      const dateStr = start.split('T')[0];
      const timeStr = e.start?.dateTime
        ? new Date(e.start.dateTime).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
        : 'All day';
      // Infer type from title/description
      const title = (e.summary || '').toLowerCase();
      let type = 'experience';
      // Hotel detection — must NOT be a flight
      const isHotel = (title.includes('check-in') || title.includes('checkin') || title.includes('check in') ||
        title.includes('hotel') || title.includes('resort') || title.includes('inn') || title.includes('marriott') ||
        title.includes('hilton') || title.includes('hyatt') || title.includes('westin') || title.includes('sheraton') ||
        title.includes('fairmont') || title.includes('four seasons') || title.includes('ritz')) &&
        !title.includes('flight') && !title.includes('airline') && !title.includes('depart') && !title.includes('arrive');
      const isFlight = title.includes('flight') || title.includes('airline') || title.includes('departs') ||
        title.includes('arrives') || title.includes(' to ') && (title.includes('aa ') || title.includes('ua ') || title.includes('dl '));
      const isFood = title.includes('dinner') || title.includes('lunch') || title.includes('breakfast') ||
        title.includes('restaurant') || title.includes('brunch') || title.includes('café') || title.includes('cafe') ||
        title.includes('dining') || title.includes('reserv');
      const isSpa = title.includes('spa') || title.includes('massage') || title.includes('treatment');
      const isTour = title.includes('tour') || title.includes('excursion') || title.includes('boat') ||
        title.includes('snorkel') || title.includes('activity') || title.includes('hike');

      if (isFlight) type = 'flight';
      else if (isHotel) type = 'hotel';
      else if (isFood) type = 'food';
      else if (isSpa || isTour) type = 'experience';

      return {
        id: uid(),
        title: e.summary || 'Event',
        date: dateStr,
        time: timeStr,
        type,
        location: e.location || '',
        description: e.description || ''
      };
    });
  } catch(err) {
    console.error('GCal fetch error:', err);
    return [];
  }
}

// Handle OAuth callback (runs on page load)
function gcalHandleCallback() {
  try {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('access_token');
    const expiry = params.get('expiry');
    const refresh = params.get('refresh_token');
    if (token && expiry) {
      localStorage.setItem('gcal_access_token', token);
      localStorage.setItem('gcal_token_expiry', expiry);
      if (refresh) localStorage.setItem('gcal_refresh_token', refresh);
      // Clean URL
      window.history.replaceState({}, '', window.location.pathname);
      return true;
    }
  } catch(e) {}
  return false;
}

const GOOGLE_PLACES_KEY = 'AIzaSyC7cwZJLcO-dJVyJ_OA6P3AYlIgMaMSDhk';

async function searchGooglePlaces(query, type) {
  try {
    // Route through Cloudflare worker to avoid CORS restrictions
    const res = await fetch(
      WORKER_URL + '/places?' +
      new URLSearchParams({ query, type })
    );
    if (!res.ok) {
      console.error('Places search error:', res.status);
      return null;
    }
    return await res.json();
  } catch(e) {
    console.error('Places fetch error:', e);
    return null;
  }
}

function priceLevel(n) {
  if (n == null) return '';
  return ['$','$$','$$$','$$$$'][n] || '';
}

async function searchHotels(query) {
  const data = await searchGooglePlaces(query + ' hotel resort');
  if (!data) {
    alert('Search unavailable. Please add the hotel manually.');
    return [];
  }
  return (data.places || []).map(p => ({
    id: uid(),
    place_id: p.id,
    name: p.displayName?.text || p.name,
    address: p.formattedAddress || '',
    stars: p.priceLevel ? Math.min(p.priceLevel, 5) : 4,
    rating: p.rating ? p.rating.toFixed(1) : null,
    type: p.types?.includes('lodging') ? 'Hotel' : 'Property',
    desc: p.formattedAddress || '',
    website: p.websiteUri || '',
    phone: p.internationalPhoneNumber || '',
    price: priceLevel(p.priceLevel),
    userRatings: p.userRatingCount || 0,
  }));
}

async function searchRestaurants(query) {
  const data = await searchGooglePlaces(query + ' restaurant');
  if (!data) {
    alert('Search unavailable. Please add the restaurant manually.');
    return [];
  }
  return (data.places || []).map(p => ({
    id: uid(),
    place_id: p.id,
    name: p.displayName?.text || p.name,
    cuisine: p.types?.find(t => !['restaurant','food','point_of_interest','establishment','food'].includes(t))?.replace(/_/g,' ') || 'Restaurant',
    address: p.formattedAddress || '',
    price: priceLevel(p.priceLevel),
    rating: p.rating ? p.rating.toFixed(1) : null,
    desc: p.formattedAddress || '',
    website: p.websiteUri || '',
    phone: p.internationalPhoneNumber || '',
    userRatings: p.userRatingCount || 0,
  }));
}

function PhotoStrip({ photos = [], onAdd, category = '' }) {
  return (

        {photos.map((p, i) => (

        ))}

          <span style={{ color: 'var(--warm-mid)', fontSize: 28 }}>+</span>

}

          </div>
        </div>
        <div className="sheet-body" style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          {prompts.map(p => (
            <div key={p.key}>
              <div className="input-label">{p.label}</div>
              {p.type === 'stars' && (
                <StarRating value={form[p.key] || 0} onChange={v => set(p.key, v)} />

// ── AI SUMMARY TAB ────────────────────────────────────────────────────────────
function AISummaryTab({ trip }) {
  const [blog, setBlog] = useState('');
  const [insta, setInsta] = useState('');
  const [loadingBlog, setLoadingBlog] = useState(false);
  const [loadingInsta, setLoadingInsta] = useState(false);
  const [copied, setCopied] = useState('');

  const buildContext = () => {
    const parts = [`Trip: ${trip.name}`, `Destination: ${trip.destination || 'N/A'}`, `Dates: ${fmt(trip.startDate)} – ${fmt(trip.endDate)}`];
    if (trip.hotel) parts.push(`Hotel: ${trip.hotel.name} (${trip.hotel.stars}⭐ ${trip.hotel.type})`);
    if (trip.restaurants?.length) parts.push(`Restaurants: ${trip.restaurants.map(r => r.name).join(', ')}`);
    if (trip.experiences?.length) parts.push(`Experiences: ${trip.experiences.map(e => e.name).join(', ')}`);

    const hotelNotes = trip.hotel?.notes || {};
    if (hotelNotes.impression) {
      if (hotelNotes.impression.standout) parts.push(`Hotel standout: ${hotelNotes.impression.standout}`);
      if (hotelNotes.impression.best_for) parts.push(`Best for: ${hotelNotes.impression.best_for}`);
    }
    const famNotes = trip.familyNotes || {};
    if (famNotes.kids_club?.notes) parts.push(`Kids club: ${famNotes.kids_club.notes}`);
    return parts.join('\n');
  };

  const genBlog = async () => {
    setLoadingBlog(true);
    const ctx = buildContext();
    const text = await callClaude(
      `Write a warm, vivid travel blog post about this familiarization trip. Use first-person voice as a travel agent sharing a review for clients. Be specific, elegant, and helpful. Include practical tips. 400–500 words.\n\n${ctx}`,
      'You are an expert luxury travel writer. Write beautifully and specifically. No generic filler.'
    );
    setBlog(text);
    setLoadingBlog(false);
  };

  const genInsta = async () => {
    setLoadingInsta(true);
    const ctx = buildContext();
    const text = await callClaude(
      `Write an Instagram caption for this fam trip. Make it aspirational, warm, and authentic — like a travel agent sharing a personal experience with their audience. 100–150 words, include 15–20 relevant hashtags at the end.\n\n${ctx}`,
      'You are a luxury travel influencer and agent. Write for Instagram: punchy, visual, warm.'
    );
    setInsta(text);
    setLoadingInsta(false);
  };

  const copy = (text, key) => {
    navigator.clipboard.writeText(text);
    setCopied(key);
    setTimeout(() => setCopied(''), 2000);
  };

  const completeness = [trip.hotel, trip.restaurants?.length, trip.experiences?.length, Object.keys(trip.familyNotes||{}).length].filter(Boolean).length;

  return (
    <div>
      <div className="hero-band">
        <div className="hero-band-label">AI-Powered</div>
        <div className="hero-band-title">Your Summary ✨</div>
        <div style={{ fontSize: 13, opacity: 0.7, marginTop: 6 }}>{completeness}/4 sections complete — more data = better output</div>
      </div>

      <div style={{ padding: '16px 16px 0' }}>
        <button className="btn-primary" onClick={genBlog} disabled={loadingBlog}>
          {loadingBlog ? '✍️ Writing blog post…' : '📝 Generate Blog Post'}
        </button>
      </div>
      {blog && (
        <div className="ai-block" style={{ marginTop: 12 }}>
          <div className="ai-block-label">✦ Blog Post Draft</div>
          <div className="ai-block-text" style={{ whiteSpace: 'pre-wrap' }}>{blog}</div>
          <button className="btn-small" style={{ marginTop: 12 }} onClick={() => copy(blog, 'blog')}>
            {copied === 'blog' ? '✓ Copied!' : '📋 Copy'}
          </button>
        </div>
      )}

      <div style={{ padding: '12px 16px 0' }}>
        <button className="btn-outline" onClick={genInsta} disabled={loadingInsta}>
          {loadingInsta ? '📸 Writing caption…' : '📸 Generate Instagram Caption'}
        </button>
      </div>
      {insta && (
        <div className="ai-block" style={{ marginTop: 12 }}>
          <div className="ai-block-label">✦ Instagram Caption + Hashtags</div>
          <div className="ai-block-text" style={{ whiteSpace: 'pre-wrap' }}>{insta}</div>
          <button className="btn-small" style={{ marginTop: 12 }} onClick={() => copy(insta, 'insta')}>
            {copied === 'insta' ? '✓ Copied!' : '📋 Copy'}
          </button>
        </div>
      )}

      {!blog && !insta && (
        <div className="empty" style={{ paddingTop: 24 }}>
          <div className="empty-icon">✨</div>
          <div className="empty-title">Ready when you are</div>
          <div className="empty-sub">Fill in hotel, food, and experience sections for richer AI summaries. Then generate your blog post or Instagram caption above.</div>
        </div>
      )}
    </div>
  );
}

function GCalCreateButton({ form, valid, onSave }) {
  const [loading, setLoading] = useState(false);
  const handleCreate = async () => {
    if (!valid) return;
    setLoading(true);
    let gcalEvents = [];
    if (gcalIsConnected()) {
      gcalEvents = await gcalFetchEvents(form.startDate, form.endDate);
    }
    // Auto-detect hotel from GCal events (exclude flights)
    let autoHotel = null;
    const hotelEvent = gcalEvents.find(e => e.type === 'hotel');
    if (hotelEvent) {
      // Clean up the hotel name
      const hotelName = hotelEvent.title
        .replace(/check-?in\s*[-—:]\s*/i, '')
        .replace(/check-?out\s*[-—:]\s*/i, '')
        .replace(/hotel\s*[-—:]\s*/i, '')
        .replace(/reservation\s*[-—:]\s*/i, '')
        .trim();
      autoHotel = {
        id: uid(),
        name: hotelName || hotelEvent.title,
        address: hotelEvent.location || '',
        stars: 5,
        rating: null,
        type: 'Hotel',
        desc: 'Imported from Google Calendar',
        website: '',
        fromCalendar: true,
        notes: {}
      };
    }
    // Auto-detect restaurants from GCal events (exclude flights)
    const autoRestaurants = gcalEvents
      .filter(e => e.type === 'food')
      .map(e => ({
        id: uid(),
        name: e.title.replace(/dinner\s*[-—:]\s*/i,'').replace(/lunch\s*[-—:]\s*/i,'').replace(/breakfast\s*[-—:]\s*/i,'').replace(/reserv[a-z]*\s*[-—:]\s*/i,'').trim() || e.title,
        cuisine: 'Restaurant',
        address: e.location || '',
        price: '',
        rating: null,
        desc: 'Imported from Google Calendar — ' + e.time,
        website: '',
        fromCalendar: true,
        notes: {}
      }));

    onSave({ ...form, id: uid(), gcalEvents, hotel: autoHotel, restaurants: autoRestaurants, experiences: [], familyNotes: {}, hotelNotes: {} });
    setLoading(false);
  };
  return (
    <button className="btn-primary" disabled={!valid || loading} onClick={handleCreate} style={{ opacity: valid ? 1 : 0.4 }}>
      {loading ? '📅 Importing calendar events…' : 'Create Trip →'}
    </button>
  );
}


// ── DESTINATION AUTOCOMPLETE ──────────────────────────────────────────────────
function DestinationInput({ value, onChange }) {
  const [query, setQuery] = useState(value || '');
  const [suggestions, setSuggestions] = useState([]);
  const [loading, setLoading] = useState(false);
  const timerRef = useRef(null);

  const search = async (q) => {
    if (q.length < 3) { setSuggestions([]); return; }
    setLoading(true);
    try {
      const res = await fetch(
        WORKER_URL + '/places?' + new URLSearchParams({ query: q + ' city destination travel' })
      );
      const data = await res.json();
      const places = (data.places || []).map(p => ({
        name: p.displayName?.text || '',
        address: p.formattedAddress || '',
      }));
      setSuggestions(places.slice(0, 5));
    } catch(e) {}
    setLoading(false);
  };

  const handleChange = (e) => {
    const q = e.target.value;
    setQuery(q);
    onChange(q);
    clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => search(q), 400);
  };

  const select = (place) => {
    const val = place.address || place.name;
    setQuery(val);
    onChange(val);
    setSuggestions([]);
  };

  return (
    <div className="input-group" style={{ position: 'relative' }}>
      <div className="input-label">Destination</div>
      <input
        placeholder="e.g. San Juan, Puerto Rico"
        value={query}
        onChange={handleChange}
        autoComplete="off"
      />
      {loading && <div style={{ fontSize: 11, color: 'var(--warm-mid)', marginTop: 4 }}>Searching...</div>}
      {suggestions.length > 0 && (
        <div style={{
          position: 'absolute', top: '100%', left: 0, right: 0, zIndex: 999,
          background: 'var(--white)', border: '1.5px solid var(--sand)',
          borderRadius: 10, boxShadow: 'var(--shadow)', overflow: 'hidden', marginTop: 2
        }}>
          {suggestions.map((s, i) => (
            <div key={i} onClick={() => select(s)} style={{
              padding: '10px 14px', cursor: 'pointer', borderBottom: '1px solid var(--sand)',
              fontSize: 13
            }}>
              <div style={{ fontWeight: 500 }}>{s.name}</div>
              <div style={{ fontSize: 11, color: 'var(--warm-mid)', marginTop: 2 }}>{s.address}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}


function App() {
  const [trips, setTrips] = useState(() => {
    try {
      const saved = localStorage.getItem('famtrip_trips');
      return saved ? JSON.parse(saved) : [DEMO_TRIP];
    } catch(e) { return [DEMO_TRIP]; }
  });
  const [view, setView] = useState('list');
  const [selectedTrip, setSelectedTrip] = useState(null);

  // Save trips to localStorage whenever they change
  useEffect(() => {
    try { localStorage.setItem('famtrip_trips', JSON.stringify(trips)); }
    catch(e) {}
  }, [trips]);

  useEffect(() => {
    gcalHandleCallback();
  }, []);

  const updateTrip = (updates) => {
    const updated = { ...selectedTrip, ...updates };
    setSelectedTrip(updated);
    setTrips(ts => ts.map(t => t.id === updated.id ? updated : t));
  };

  const createTrip = (trip) => {
    setTrips(ts => [trip, ...ts]);
    setSelectedTrip(trip);
    setView('detail');
  };

  return (
    <>
      <style>{CSS}</style>
      <div className="app">
        {/* TOP BAR */}
        <div className="topbar">
          {view !== 'list' && (
            <button className="topbar-back" onClick={() => { setView(view === 'detail' ? 'list' : 'list'); }}>‹</button>
          )}
          <div>
            <div className="topbar-title">{view === 'list' ? 'Fam Trip' : view === 'new' ? 'New Trip' : selectedTrip?.name}</div>
            <div className="topbar-sub">{view === 'list' ? 'Travel Agent Notes' : view === 'new' ? 'Document your trip' : selectedTrip?.destination || 'Familiarization Trip'}</div>
          </div>
          <div style={{ width: 40 }} />
        </div>

        {/* VIEWS */}
        {view === 'list' && (
          <TripsListView trips={trips} onSelect={t => { setSelectedTrip(t); setView('detail'); }} onCreate={() => setView('new')} onDelete={id => setTrips(ts => ts.filter(t => t.id !== id))} />
        )}
        {view === 'new' && <NewTripView onSave={createTrip} onBack={() => setView('list')} />}
        {view === 'detail' && selectedTrip && (
          <TripDetailView trip={selectedTrip} onUpdate={updateTrip} onBack={() => setView('list')} />
        )}

        {/* BOTTOM NAV */}
        <div className="bottom-nav">
          <button className={`nav-item ${view === 'list' ? 'active' : ''}`} onClick={() => setView('list')}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Trips
          </button>
          <button className={`nav-item ${view === 'new' ? 'active' : ''}`} onClick={() => setView('new')}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            New Trip
          </button>
          <button className="nav-item" onClick={() => selectedTrip && setView('detail')}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/></svg>
            Current
          </button>
        </div>
      </div>
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
